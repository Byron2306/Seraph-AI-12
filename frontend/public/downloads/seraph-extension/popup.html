<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
    }
    .header {
      padding: 16px;
      background: rgba(59, 130, 246, 0.1);
      border-bottom: 1px solid rgba(59, 130, 246, 0.3);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header img { width: 32px; height: 32px; border-radius: 6px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header span { font-size: 10px; color: #94a3b8; }
    .status {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    .status-dot.inactive { background: #ef4444; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px;
    }
    .stat {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #3b82f6;
    }
    .stat-value.blocked { color: #ef4444; }
    .stat-value.alerts { color: #f59e0b; }
    .stat-label {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .actions {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #94a3b8;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); color: white; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
      font-size: 10px;
      color: #64748b;
    }
    .footer a { color: #3b82f6; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon32.png" alt="Seraph AI">
    <div>
      <h1>Seraph AI Defender</h1>
      <span>v1.0.0</span>
    </div>
  </div>
  
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Protection Active</span>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-value blocked" id="blocked">0</div>
      <div class="stat-label">Sites Blocked</div>
    </div>
    <div class="stat">
      <div class="stat-value alerts" id="alerts">0</div>
      <div class="stat-label">Threats Detected</div>
    </div>
  </div>
  
  <div class="actions">
    <button class="btn btn-primary" id="toggleBtn">Disable Protection</button>
    <button class="btn btn-secondary" id="dashboardBtn">Open Dashboard</button>
  </div>
  
  <div class="footer">
    Powered by <a href="https://seraph-security.preview.emergentagent.com" target="_blank">Seraph AI</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
